<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Needing Attention</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Space+Mono:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }

        .metric-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.1), 0 8px 24px rgba(220, 38, 38, 0.2);
            min-width: 160px;
            max-width: 200px;
            border: 3px solid #dc2626;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.05) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .metric-icon {
            font-size: 36px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .metric-value {
            font-size: 56px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: #dc2626;
            line-height: 1;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: -2px;
        }

        .metric-label {
            font-size: 12px;
            color: #71717a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .metric-change {
            font-size: 11px;
            color: #dc2626;
            margin-top: 8px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .tap-action {
            font-size: 10px;
            color: #a1a1aa;
            margin-top: 10px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="metric-card" onclick="openTaskList()">
        <div class="metric-icon">🔥</div>
        <div class="metric-value">7</div>
        <div class="metric-label">Overdue Tasks</div>
        <div class="metric-change">Due by 3pm today</div>
        <div class="tap-action">Tap to view list</div>
    </div>

    <script>
        function openTaskList() {
            alert('Opening overdue task list:\n\n1. Inventory Count - Aisle 7\n2. Safety Audit - Stockroom\n3. Visual Merch - Front Display\n4. Team Survey - Week 9\n5. Price Changes - Electronics\n6. Wellness Planogram - Beauty\n7. Compliance Check - Exits');
        }
    </script>
</body>
</html>
