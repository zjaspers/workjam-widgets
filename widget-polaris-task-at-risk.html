<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Polaris Task At Risk</title>
<style>
:root{--accent:#C0392B;--navy:#2B3990;--text:#1A1A2E;--text-sec:#4B5373;--border:#E2E7F0;--bg:#F8FAFC}
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:transparent;padding:0;margin:0;width:100%;height:100%;min-height:100vh;display:flex;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:transparent;padding:0;margin:0;width:100%;height:100%;}
.card{width:100%;height:100vh;min-height:100%;margin:0;background:white;border:1px solid var(--border);border-left:5px solid var(--accent);border-radius:0;overflow:hidden;box-shadow:none;display:flex;flex-direction:column;}
.card-top{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex:1;min-height:0;}.info h3{font-size:15px;font-weight:800;letter-spacing:-.3px;color:var(--text)}.info p{font-size:11px;color:var(--text-sec);margin-top:2px;font-weight:600}
.score{text-align:right;flex-shrink:0}.score-val{font-size:20px;font-weight:800;color:var(--accent);line-height:1}.score-lbl{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--text-sec);display:block;margin-top:2px}
.bar{background:#F1F5F9;padding:7px 12px;display:flex;justify-content:space-between;gap:10px;font-size:10px;font-weight:700;border-top:1px solid var(--border);flex-shrink:0;}.risk-text{color:var(--accent)}
.actions{padding:8px;background:var(--bg);display:flex;gap:8px;flex-shrink:0;}.btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:white;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}.btn.primary{background:var(--navy);color:white;border:none}
#toast{position:fixed;bottom:10px;left:10px;right:10px;background:var(--text);color:white;padding:12px;border-radius:8px;font-size:11px;font-weight:700;transform:translateY(200%);transition:.3s;z-index:99;text-align:center}#toast.show{transform:translateY(0)}

@media(max-height:140px){
  .card-top{padding:6px 10px;}
  .info h3{font-size:13px;}
  .info p{font-size:10px;}
  .score-val{font-size:18px;}
  .bar{padding:5px 10px;font-size:9px;}
  .actions{padding:6px;}
  .btn{padding:7px;font-size:9px;}
}
</style></head>
<body><div class="card"><div class="card-top"><div class="info"><h3>Polaris - Task At Risk</h3><p>7 Overdue • Stocking Backlog</p></div><div class="score"><span class="score-val">2.8</span><span class="score-lbl">CSAT</span></div></div><div class="bar"><span>Process execution: -22%</span><span class="risk-text">Risk: -$1.2k</span></div><div class="actions"><button class="btn primary" onclick="act('Polaris', 'Audit')">Launch Audit</button><button class="btn" onclick="act('Polaris', 'Nudge')">Nudge Manager</button></div></div><div id="toast">Launching...</div>
<script>function act(s,t){const toast=document.getElementById('toast');toast.innerText=t==='Audit'?`✓ Pivoting to WorkJam Audit for ${s}...`:`Nudge sent to Store Manager.`;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3000);}</script></body></html>
