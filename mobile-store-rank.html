<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store Ranking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Space+Mono:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }

        .metric-card {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.2), 0 8px 24px rgba(245, 158, 11, 0.25);
            min-width: 160px;
            max-width: 200px;
            position: relative;
            overflow: hidden;
        }

        .metric-icon {
            font-size: 36px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .metric-value {
            font-size: 56px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: #78350f;
            line-height: 1;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: -2px;
        }

        .metric-label {
            font-size: 12px;
            color: #92400e;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .metric-change {
            font-size: 11px;
            color: #78350f;
            margin-top: 8px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .percentile {
            font-size: 10px;
            color: #92400e;
            margin-top: 6px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="metric-card">
        <div class="metric-icon">📍</div>
        <div class="metric-value">#47</div>
        <div class="metric-label">District Rank</div>
        <div class="metric-change">of 82 stores</div>
        <div class="percentile">↑ Up 3 spots</div>
    </div>
</body>
</html>
