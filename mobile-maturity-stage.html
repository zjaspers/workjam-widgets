<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Maturity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=JetBrains+Mono:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }

        .metric-card {
            background: linear-gradient(135deg, #ddd6fe 0%, #c4b5fd 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2), 0 8px 24px rgba(139, 92, 246, 0.35);
            min-width: 160px;
            max-width: 200px;
            border: 3px solid #8b5cf6;
        }

        .metric-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .metric-value {
            font-size: 56px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #5b21b6;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
            text-shadow: 0 2px 8px rgba(91, 33, 182, 0.25);
        }

        .metric-label {
            font-size: 12px;
            color: #6b21a8;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-change {
            font-size: 11px;
            color: #5b21b6;
            margin-top: 8px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="metric-card">
        <div class="metric-icon">📊</div>
        <div class="metric-value">Stage 3</div>
        <div class="metric-label">Platform Maturity</div>
        <div class="metric-change">Operational</div>
    </div>
</body>
</html>
