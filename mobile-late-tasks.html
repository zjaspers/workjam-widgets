<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late Task Cost</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=JetBrains+Mono:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 8px;
        }

        .metric-card {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.2), 0 8px 24px rgba(220, 38, 38, 0.3);
            min-width: 160px;
            max-width: 200px;
            border: 3px solid #dc2626;
            position: relative;
        }

        .metric-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .metric-value {
            font-size: 48px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: #991b1b;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .metric-label {
            font-size: 12px;
            color: #7f1d1d;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-change {
            font-size: 11px;
            color: #991b1b;
            margin-top: 8px;
            font-weight: 700;
        }

        .detail {
            font-size: 10px;
            color: #7f1d1d;
            margin-top: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="metric-card">
        <div class="metric-icon">⏰</div>
        <div class="metric-value">6,300</div>
        <div class="metric-label">Tasks Late</div>
        <div class="metric-change">7.3pt gap to close</div>
        <div class="detail">= $2-4M value at risk</div>
    </div>
</body>
</html>
