    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #fafafa;
        padding: 0;
        margin: 0;
    }

    .score-widget {
        min-width: 220px;
        max-width: 900px;
        margin: 16px auto;
        background: white;
        border-radius: 24px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
        overflow: hidden;
    }

    .scores-container {
        padding: 32px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .score-card {
        background: #f9fafb;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        border: 2px solid transparent;
        transition: all 0.3s ease;
    }

    .score-card:hover {
        border-color: #059669;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(5, 150, 105, 0.15);
    }

    .score-label {
        font-size: 11px;
        font-weight: 700;
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
    }

    .score-value {
        font-size: 56px;
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        line-height: 1;
        margin-bottom: 8px;
        letter-spacing: -2px;
    }

    .score-icon {
        font-size: 32px;
        margin-bottom: 12px;
    }

    .task-health .score-value {
        color: #059669;
    }

    .store-score .score-value {
        color: #f59e0b;
    }

    .score-subtitle {
        font-size: 13px;
        color: #71717a;
        font-weight: 500;
    }

    .score-percentage {
        font-size: 13px;
        font-weight: 700;
        margin-top: 6px;
    }

    .positive {
        color: #059669;
    }

    .details-section {
        padding: 0 32px 32px;
    }

    .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid #f4f4f5;
    }

    .detail-row:last-child {
        border-bottom: none;
    }

    .detail-label {
        font-size: 14px;
        font-weight: 600;
        color: #18181b;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .detail-value {
        font-size: 18px;
        font-weight: 700;
        font-family: 'JetBrains Mono', monospace;
        color: #18181b;
    }

    .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .status-good {
        background: #059669;
    }

    .status-warning {
        background: #f59e0b;
    }

    .refresh-info {
        padding: 16px 32px;
        background: #f9fafb;
        border-top: 1px solid #e5e7eb;
        text-align: center;
        font-size: 12px;
        color: #71717a;
    }

    @media (max-width: 480px) {
        body {
            padding: 0;
        }

        .score-widget {
            margin: 0;
            border-radius: 0;
        }

        .scores-container {
            grid-template-columns: 1fr;
            padding: 24px;
            gap: 16px;
        }
        
        .score-card {
            padding: 24px;
        }

        .details-section {
            padding: 0 24px 24px;
        }

        .refresh-info {
            padding: 16px 24px;
        }
    }
</style>

    <div class="score-widget">
        <div class="scores-container">
            <div class="score-card task-health">
                <div class="score-label">Task Health</div>
                <div class="score-icon">✓</div>
                <div class="score-value" id="taskHealthScore">92</div>

```
        <div class="score-card store-score">
            <div class="score-label">Store Score</div>
            <div class="score-icon">★</div>
            <div class="score-value" id="storeScore">88</div>
            <div class="score-subtitle">Overall Rating</div>
            <div class="score-percentage positive" id="storeScoreTrend">↑ 3% vs last week</div>
        </div>
    </div>

    <div class="details-section">
        <div class="detail-row">
            <div class="detail-label">
                <span class="status-indicator status-good"></span>
                Tasks Completed
            </div>
            <div class="detail-value" id="tasksCompleted">47/50</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">
                <span class="status-indicator status-warning"></span>
                Tasks In Progress
            </div>
            <div class="detail-value" id="tasksInProgress">3</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">
                <span class="status-indicator status-good"></span>
                On-Time Completion
            </div>
            <div class="detail-value" id="onTimeRate">94%</div>
        </div>
        <div class="detail-row">
            <div class="detail-label">
                <span class="status-indicator status-good"></span>
                Team Compliance
            </div>
            <div class="detail-value" id="complianceRate">96%</div>
        </div>
    </div>

    <div class="refresh-info">
        Last updated: <span id="lastUpdated">Just now</span>
    </div>
</div>

<script>
    function updateScores(taskHealth, storeScore, metrics) {
        document.getElementById('taskHealthScore').textContent = taskHealth;
        document.getElementById('storeScore').textContent = storeScore;
        
        if (metrics) {
            if (metrics.tasksCompleted) {
                document.getElementById('tasksCompleted').textContent = metrics.tasksCompleted;
            }
            if (metrics.tasksInProgress) {
                document.getElementById('tasksInProgress').textContent = metrics.tasksInProgress;
            }
            if (metrics.onTimeRate) {
                document.getElementById('onTimeRate').textContent = metrics.onTimeRate + '%';
            }
            if (metrics.complianceRate) {
                document.getElementById('complianceRate').textContent = metrics.complianceRate + '%';
            }
        }
        
        document.getElementById('lastUpdated').textContent = 'Just now';
    }

    function fetchWorkJamScores() {
        console.log('Ready to fetch WorkJam scores');
    }

    setInterval(fetchWorkJamScores, 300000);
    fetchWorkJamScores();
</script>
